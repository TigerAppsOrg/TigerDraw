<style>
    html,
    body {
        height: 100%;
    }

    #mapid {
        height: 100%;
        width: 100%;
        float: left;
        position: relative;
        z-index: 0;
    }

    .legend {
        line-height: 18px;
        color: #555;
    }

    .legend i {
        width: 100px;
        height: 17px;
        float: left;
        margin-right: 8px;
        opacity: 0.7;
        padding-bottom: 20px;

    }

    .info {
        padding: 6px 8px;
        font: 14px/16px Arial, Helvetica, sans-serif;
        background: white;
        background: rgba(255, 255, 255, 0.8);
        box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
        border-radius: 5px;
    }


    .help-tip {
        margin: auto;
        right: 40px;
        position: absolute;
        text-align: center;
        background-color: #7884F1;
        border-radius: 50%;
        width: 24px;
        height: 24px;
        font-size: 14px;
        line-height: 26px;
        cursor: default;
        z-index: 1;
        margin-right: -7px;
        top: 50px;
    }

    .help-tip:before {
        content: '?';
        font-weight: bold;
        color: #fff;
    }

    .help-tip:hover p {
        display: block;
        transform-origin: 100% 0%;

        -webkit-animation: fadeIn 0.3s ease-in-out;
        animation: fadeIn 0.3s ease-in-out;

    }

    .help-tip p {
        /* The tooltip */
        display: none;
        text-align: left;
        background-color: #7884F1;
        padding: 10px;
        width: 300px;
        position: absolute;
        border-radius: 3px;
        box-shadow: 1px 1px 1px rgba(0, 0, 0, 0.2);
        right: -4px;
        top: -150px;
        color: #FFF;
        font-size: 13px;
        line-height: 1.4;
    }

    .help-tip p:before {
        /* The pointer of the tooltip */
        position: absolute;
        content: '';
        width: 0;
        height: 0;
        border: 6px solid transparent;
        border-bottom-color: #7884F1;
        right: 10px;
        top: 40px;
    }

    .help-tip p:after {
        /* Prevents the tooltip from being hidden */
        width: 100%;
        height: 40px;
        content: '';
        position: absolute;
        top: 40px;
        left: 0;
    }

    .help-tip-relative {
        right: 18px;
        text-align: center;
        background-color: #7884F1;
        border-radius: 50%;
        width: 24px;
        height: 24px;
        font-size: 14px;
        line-height: 26px;
        cursor: default;
        margin: auto;
    }

    .help-tip-relative:before {
        content: '?';
        font-weight: bold;
        color: #fff;
    }

    .help-tip-relative:hover p {
        display: block;
        transform-origin: 100% 0%;

        -webkit-animation: fadeIn 0.3s ease-in-out;
        animation: fadeIn 0.3s ease-in-out;

    }

    .help-tip-relative p {
        /* The tooltip */
        display: none;
        text-align: left;
        background-color: #7884F1;
        padding: 10px;
        width: 300px;
        position: absolute;
        border-radius: 3px;
        box-shadow: 1px 1px 1px rgba(0, 0, 0, 0.2);
        right: -4px;
        color: #FFF;
        font-size: 13px;
        line-height: 1.4;
    }

    .help-tip-relative p:before {
        /* The pointer of the tooltip */
        position: absolute;
        content: '';
        width: 0;
        height: 0;
        border: 6px solid transparent;
        border-bottom-color: #7884F1;
        right: 10px;
        top: 40px;
    }

    .help-tip-relative p:after {
        /* Prevents the tooltip from being hidden */
        width: 100%;
        height: 40px;
        content: '';
        position: absolute;
        top: 40px;
        left: 0;
    }


    /* CSS animation */

    @-webkit-keyframes fadeIn {
        0% {
            opacity: 0;
            transform: scale(0.6);
        }

        100% {
            opacity: 100%;
            transform: scale(1);
        }
    }

    @keyframes fadeIn {
        0% {
            opacity: 0;
        }

        100% {
            opacity: 100%;
        }
    }

    /* Building Side Panel */
    #buildingPanel {
        position: fixed;
        top: 0;
        right: -420px;
        width: 420px;
        height: 100vh;
        background: #fff;
        box-shadow: -4px 0 20px rgba(0,0,0,0.15);
        z-index: 1000;
        transition: right 0.3s ease;
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }
    #buildingPanel.open {
        right: 0;
    }
    #buildingPanel .panel-header {
        background: linear-gradient(135deg, #e77500 0%, #f59e42 100%);
        color: white;
        padding: 14px 18px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-shrink: 0;
    }
    #buildingPanel .panel-header h5 {
        margin: 0;
        font-size: 1.1rem;
        font-weight: 600;
    }
    #buildingPanel .panel-close {
        background: none;
        border: none;
        color: white;
        font-size: 1.5rem;
        cursor: pointer;
        line-height: 1;
        padding: 0 4px;
    }
    #buildingPanel .panel-close:hover {
        opacity: 0.7;
    }
    .floor-tabs {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        padding: 10px 16px;
        background: #f8f8f8;
        border-bottom: 1px solid #eee;
        flex-shrink: 0;
    }
    .floor-tab {
        padding: 5px 12px;
        border: 1px solid #ddd;
        border-radius: 16px;
        background: #fff;
        cursor: pointer;
        font-size: 0.85rem;
        font-weight: 500;
        color: #555;
        transition: all 0.15s;
    }
    .floor-tab:hover {
        border-color: #e77500;
        color: #e77500;
    }
    .floor-tab.active {
        background: #e77500;
        color: #fff;
        border-color: #e77500;
    }
    .floor-plan-preview {
        flex-shrink: 0;
        height: 300px;
        background: #f5f5f5;
        border-bottom: 1px solid #eee;
        position: relative;
    }
    .floor-plan-preview iframe {
        width: 100%;
        height: 100%;
        border: none;
    }
    .floor-plan-preview .expand-btn {
        position: absolute;
        top: 8px;
        right: 8px;
        background: rgba(0,0,0,0.6);
        color: #fff;
        font-size: 0.75rem;
        padding: 4px 10px;
        border-radius: 4px;
        cursor: pointer;
        z-index: 2;
        border: none;
    }
    .floor-plan-preview .expand-btn:hover {
        background: rgba(0,0,0,0.8);
    }
    .room-list {
        flex: 1;
        overflow-y: auto;
        padding: 0;
    }
    .room-list-header {
        padding: 10px 16px 6px;
        font-size: 0.8rem;
        color: #888;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        position: sticky;
        top: 0;
        background: #fff;
        z-index: 1;
        border-bottom: 1px solid #f0f0f0;
    }
    .room-card {
        display: flex;
        align-items: center;
        padding: 10px 16px;
        border-bottom: 1px solid #f0f0f0;
        cursor: pointer;
        transition: background 0.15s;
        gap: 12px;
    }
    .room-card:hover {
        background: #fef6ed;
    }
    .room-rank-dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        flex-shrink: 0;
    }
    .room-card-info {
        flex: 1;
        min-width: 0;
    }
    .room-card-title {
        font-weight: 600;
        font-size: 0.95rem;
        color: #333;
    }
    .room-card-meta {
        font-size: 0.8rem;
        color: #888;
        margin-top: 1px;
    }
    .room-card-badges {
        display: flex;
        gap: 4px;
        flex-shrink: 0;
    }
    .room-badge {
        font-size: 0.7rem;
        padding: 2px 6px;
        border-radius: 10px;
        background: #f0f0f0;
        color: #666;
    }
    .room-badge-360 {
        background: #e8f5e9;
        color: #2e7d32;
    }
    .panel-loading {
        display: flex;
        align-items: center;
        justify-content: center;
        flex: 1;
        color: #888;
    }
    .panel-empty {
        display: flex;
        align-items: center;
        justify-content: center;
        flex: 1;
        color: #aaa;
        text-align: center;
        padding: 40px;
    }

</style>

<script>

        "blair": ["A", "1", "2", "3", "4"],

        "addy": ["3", "4", "5", "6", "7"],

        "jones": ["G", "1", "2", "3", "4", "5", "6"],
        "feliciano": ["G", "1", "2", "3", "4", "5", "6"],
        // YEH
        "fu": ["G", "1", "2", "3", "4", "5"],
        "grousbeck": ["1", "2", "3", "4", "5"],
        "hariri": ["3", "4", "5", "6"],
        "mannion": ["G", "1", "2", "3", "4", "5"],
        // ROCKY
        "buyers": ["A", "1", "2", "3"],
        "holder": ["A", "1", "2", "3", "4", "5"],
        "witherspoon": ["G", "1", "2", "3", "4", "5", "6"],
        // UPPERCLASS
        "laughlin1901": ["G", "1", "2", "3", "4"],
        "1903": ["A", "1", "2", "3", "4"],
        "brown": ["A", "1", "2", "3", "4"],
        "cuyler": ["A", "1", "2", "3"],
        "dod": ["A", "1", "2", "3", "4", "5"],
        "foulke": ["G", "1", "2", "3", "4"],
        "henry": ["G", "1", "2", "3", "4", "5"],
        "lockhart": ["G", "1", "2", "3", "4"],
        "patton": ["A", "G", "1", "2", "3", "4"],
        "pyne": ["A", "1", "2", "3", "4", "5"],
        "spelman": ["A", "1", "2", "3", "4"],
        "wright": ["A", "1", "2", "3", "4"],
        "1981": ["A", "G", "1", "2", "3", "4"],
        "wendell": {
            "B": ["G", "1", "2", "3", "4"],
            "C": ["G", "1", "2", "3", "4"]
        },
        "fisher": ["G", "1", "2", "3"],
        "hargadon": ["G", "1", "2", "3", "4"],
        "lauritzen": ["G", "1", "2", "3", "4"],
        "baker": {
            "E": ["G", "1", "2", "3", "4"],
            "S": ["G", "1", "2", "3", "4"]
        },
        "murley": ["G", "1", "2", "3", "4"],
        "walker": ["A", "G", "1", "2", "3"],
        "feinberg": ["G", "1", "2", "3", "4", "4M"]
    }

    var mbAttr = 'Map data &copy; <a href="https://openstreetmap.org">OpenStreetMap</a> contributors, ' +
        '<a href="https://creativecommons.org/licenses/by-sa/2.0/">CC-BY-SA</a>, ' +
        'Imagery © <a href="https://mapbox.com">Mapbox</a>'
    var mbUrl = 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
    var base = L.tileLayer(mbUrl, { id: 'mapbox/streets-v11', attribution: mbAttr, maxNativeZoom: 19, maxZoom: 22 })
    var mymap = L.map('mapid', { layers: base, maxZoom: 22 }).setView([40.3459, -74.658], 17);



    var c = {{ allrank | tojson }};
    // console.log(c)

    var legend = L.control({ position: 'bottomright' });
    legend.onAdd = function (map) {

        var div = L.DomUtil.create('div', 'info legend'),
            grades = [0, 50, 100, 200, 300, 400, 500],
            labels = [];

        // loop through our density intervals and generate a label with a colored square for each interval
        div.innerHTML += '<i style="background:' + getColor(grades[0]) + '"></i>' + 'Drawn First<br>';
        for (var i = 1; i < grades.length - 1; i++) {
            if (grades[i] === 200) {
                div.innerHTML += '<i style="background:' + getColor(grades[i]) + '"></i><div class="help-tip" data-placement="right">\
                            <p>The color gradient is based off the average rank (from the most recent room draw) for all rooms in the building. Red indicates that many rooms have a \'high rank\', \
                            ie. were drawn very early during room draw. Yellow indicates that many rooms have a \'low rank\', ie. were drawn very late during room draw.</p></div><br>';
            }
            else {
                div.innerHTML += '<i style="background:' + getColor(grades[i]) + '"></i><br>';
            }
        }

        div.innerHTML += '<i style="background:' + getColor(grades[grades.length - 1]) + '"></i>' + 'Drawn Last' + '<br>';

        return div;
    };
    legend.addTo(mymap);


    function getColor(d) {
        return d < 50 ? '#800026' :
            d < 100 ? '#BD0026' :
                d < 200 ? '#E31A1C' :
                    d < 300 ? '#FC4E2A' :
                        d < 400 ? ' #FD8D3C' :
                            d < 500 ? '#FEB24C' :
                                '#FED976';
    }

    function getcolor(name) {
        average = null

        if (name.includes("Spelman")) {
            name = "Spelman Hall";
        }
        if (name.includes("Hall")) {
            name = name.substring(0, name.length - 5)
        }
        if (name == "Dodge-Osborne") {
            name = "DODGE OSBORNE";
        }

        if (name == "1927-Clapp") {
            average = (c["1927"] + c["CLAPP"]) / 2;
        }
        else if (name == "Bogle Hall, 1976 Hall, Wilf") {
            average = (c["BOGLE"] + c["1976"] + c["WILF"]) / 3;
        }
        else if (name == "Yoseloff Hall, 1967") {
            average = (c["YOSELOFF"] + c["1967"]) / 2;
        }
        else if (name == "Laughlin 1901") {
            average = (c["LAUGHLIN"] + c["1901"]) / 2;
        }
        else if (name == "Whitman College, Hargadon") {
            average = (c["1981"] + c["BAKER"] + c["LAURITZEN"] + c["HARGADON"] + c["MURLEY"] + c["WENDELL"]) / 6;
        }
        else {
            average = c[name.toUpperCase()];
        }
        
        // default color is red-orange
        if (!average) {
            average = 190;
        }

        var color = average < 50 ? '#800026' :
            average < 100 ? '#BD0026' :
                average < 200 ? '#E31A1C' :
                    average < 300 ? '#FC4E2A' :
                        average < 400 ? ' #FD8D3C' :
                            average < 500 ? '#FEB24C' :
                                '#FED976';

        return color;
    }

    var minrank = {{ minrank | tojson }};
    var maxrank = {{ maxrank | tojson }};
    function makePopupContent(name) {
        lowest = null
        highest = null
        lowest2 = null
        highest2 = null
        orig_name = name
        if (name.includes("Spelman")) {
            name = "Spelman Hall";
        }
        if (name.includes("Hall")) {
            name = name.substring(0, name.length - 5);
        }
        if (name == "Dodge-Osborne") {
            name = "Dodge Osborn";
        }
        if (name == "1927-Clapp") {
            lowest = minrank["1927"]
            lowest2 = minrank["CLAPP"]
            highest = maxrank["1927"]
            highest2 = maxrank["CLAPP"]
            return html;
        }
        else {
            lowest = minrank[name.toUpperCase()]
            highest = maxrank[name.toUpperCase()]
            html = '';

            nameJSON = name.toLowerCase()
            nameJSON = nameJSON.replace(/\s+/g, '')

            if (floorPlans.hasOwnProperty(nameJSON)) {
                html += '<p>'
                html += orig_name
                html += ' Floor Plans:</br>'
                if (nameJSON == "forbes") {
                    html += `<div>Annex: `
                    for (let i in floorPlans[nameJSON]['annex']) {
                        let floorNum = floorPlans[nameJSON]['annex'][i]

                        html += `<a href="../static/pdfs/${nameJSON}/annex/${floorNum}.pdf" target="_blank" class="preview" style="margin-right: 2px;">${floorNum}</a>`

                    }
                    html += `</div>`
                    html += `<div>Main: `
                    for (let i in floorPlans[nameJSON]['main']) {
                        let floorNum = floorPlans[nameJSON]['main'][i]

                        html += `<a href="../static/pdfs/${nameJSON}/main/${floorNum}.pdf" target="_blank" class="preview" style="margin-right: 2px;">${floorNum}</a>`
                    }
                    html += `</div>`
                }
                else if (nameJSON == "wendell") {
                    html += `<div>Hall B: `
                    for (let i in floorPlans[nameJSON]['B']) {
                        let floorNum = floorPlans[nameJSON]['B'][i]

                        html += `<a href="../static/pdfs/${nameJSON}/B/${floorNum}.pdf" target="_blank" class="preview" style="margin-right: 2px;">${floorNum}</a>`

                    }
                    html += `</div>`
                    html += `<div>Hall C: `
                    for (let i in floorPlans[nameJSON]['C']) {
                        let floorNum = floorPlans[nameJSON]['C'][i]

                        html += `<a href="../static/pdfs/${nameJSON}/C/${floorNum}.pdf" target="_blank" class="preview" style="margin-right: 2px;">${floorNum}</a>`
                    }
                    html += `</div>`
                }
                else if (nameJSON == "baker") {
                    html += `<div>Hall E: `
                    for (let i in floorPlans[nameJSON]['E']) {
                        let floorNum = floorPlans[nameJSON]['E'][i]

                        html += `<a href="../static/pdfs/${nameJSON}/E/${floorNum}.pdf" target="_blank" class="preview" style="margin-right: 2px;">${floorNum}</a>`

                    }
                    html += `</div>`
                    html += `<div>Hall S: `
                    for (let i in floorPlans[nameJSON]['S']) {
                        let floorNum = floorPlans[nameJSON]['S'][i]

<script>
    // ========== ROOM MARKERS LAYER ==========
    // Load pre-computed room positions (from visual floor plan analysis)
    var precomputedPositions = {};
    fetch('/static/assets/js/room_positions.json')
        .then(function(res) { return res.json(); })
        .then(function(data) { precomputedPositions = data || {}; console.log('Loaded precomputed positions for', Object.keys(data).length, 'buildings'); })
        .catch(function() { console.log('No precomputed room positions found'); });

    var roomMarkersGroup = L.layerGroup().addTo(mymap);
    var loadedBuildingMarkers = {}; // building -> { floor -> [markers] }
    var activeRoomFloor = null; // currently shown floor, or null = all
    var roomMarkerZoomThreshold = 19;

    // Store all building polygon coords in [lat, lng] format for room placement
    // Manual polygons from map.html (already in [lat, lng])
    var buildingPolygons = {
        "1981": _1981_coords,
        "BAKER": baker_coords,
        "HARGADON": hargadon_coords,
        "LAURITZEN": lauritzen_coords,
        "MURLEY": murley_coords,
        "WENDELL": wendell_coords,
        "YOSELOFF": yose_coords,
        "1967": _1967_coords,
        "1976": _1976_coords,
        "BOGLE": bogle_coords,
        "WILF": wilf_coords,
        "ADDY": addy_coords,
        "KANJI": kanji_coords,
        "JONES": jones_coords,
        "FELICIANO": feliciano_coords,
        "HARIRI": hariri_coords,
        "FU": fu_coords,
        "GROUSBECK": grousbeck_coords,
        "MANNION": mannion_coords,
    };

    // Extract polygons from GeoJSON for buildings not manually defined
    // GeoJSON uses [lng, lat] so we need to flip
    if (typeof buildingData !== 'undefined') {
        buildingData.features.forEach(function(feature) {
            var name = feature.properties.name;
            if (!name) return;

            // Map GeoJSON display name to DB building name
            var dbName = geoJsonNameToDbName(name);
            if (!dbName || buildingPolygons[dbName]) return; // skip if already manual

            var coords = null;
            if (feature.geometry.type === 'Polygon') {
                coords = feature.geometry.coordinates[0];
            } else if (feature.geometry.type === 'MultiPolygon') {
                // Use the largest ring
                var largest = null, largestLen = 0;
                feature.geometry.coordinates.forEach(function(poly) {
                    if (poly[0].length > largestLen) {
                        largest = poly[0];
                        largestLen = poly[0].length;
                    }
                });
                coords = largest;
            }
            if (coords && coords.length > 2) {
                // Flip from [lng, lat] to [lat, lng]
                buildingPolygons[dbName] = coords.map(function(c) { return [c[1], c[0]]; });
            }
        });
    }

    function geoJsonNameToDbName(name) {
        // Map GeoJSON building names to DB building names
        var map = {
            "Bloomberg Hall": "BLOOMBERG",
            "Blair Hall": "BLAIR",

    // Some GeoJSON buildings map to multiple DB buildings
    var multiDbBuildings = {
        "LAUGHLIN": ["LAUGHLIN", "1901"],  // Laughlin 1901 Hall in GeoJSON
    };

    // ===== Geometry helpers =====
    function polygonBounds(coords) {
        var minLat = Infinity, maxLat = -Infinity, minLng = Infinity, maxLng = -Infinity;
        coords.forEach(function(c) {
            if (c[0] < minLat) minLat = c[0];
            if (c[0] > maxLat) maxLat = c[0];
            if (c[1] < minLng) minLng = c[1];
            if (c[1] > maxLng) maxLng = c[1];
        });
        return { minLat: minLat, maxLat: maxLat, minLng: minLng, maxLng: maxLng };
    }

    function pointInPolygon(lat, lng, polygon) {
        var inside = false;
        for (var i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
            var xi = polygon[i][0], yi = polygon[i][1];
            var xj = polygon[j][0], yj = polygon[j][1];
            var intersect = ((yi > lng) !== (yj > lng)) &&
                (lat < (xj - xi) * (lng - yi) / (yj - yi) + xi);
            if (intersect) inside = !inside;
        }
        return inside;
    }

    function polygonCentroid(coords) {
        var latSum = 0, lngSum = 0;
        coords.forEach(function(c) { latSum += c[0]; lngSum += c[1]; });
        return [latSum / coords.length, lngSum / coords.length];
    }

    // Distribute N points inside a polygon
    function distributePointsInPolygon(polygon, n) {
        if (n === 0) return [];
        var bounds = polygonBounds(polygon);
        var centroid = polygonCentroid(polygon);

        // If only 1 point, return centroid
        if (n === 1) return [centroid];

        var points = [];
        // Create a grid inside the bounding box, denser than needed
        var latRange = bounds.maxLat - bounds.minLat;
        var lngRange = bounds.maxLng - bounds.minLng;

        // Estimate grid size needed — overshoot by 3x to have plenty of candidates
        var gridSize = Math.ceil(Math.sqrt(n * 3));
        var latStep = latRange / (gridSize + 1);
        var lngStep = lngRange / (gridSize + 1);

        var candidates = [];
        for (var i = 1; i <= gridSize; i++) {
            for (var j = 1; j <= gridSize; j++) {
                var lat = bounds.minLat + i * latStep;
                var lng = bounds.minLng + j * lngStep;
                if (pointInPolygon(lat, lng, polygon)) {
                    // Score by distance from centroid (prefer inner points)
                    var dist = Math.sqrt(Math.pow(lat - centroid[0], 2) + Math.pow(lng - centroid[1], 2));
                    candidates.push({ lat: lat, lng: lng, dist: dist });
                }
            }
        }

        // Sort candidates by distance from centroid
        candidates.sort(function(a, b) { return a.dist - b.dist; });

        // Select n evenly-spaced candidates
        if (candidates.length <= n) {
            points = candidates.map(function(c) { return [c.lat, c.lng]; });
        } else {
            var step = candidates.length / n;
            for (var k = 0; k < n; k++) {
                var idx = Math.floor(k * step);
                points.push([candidates[idx].lat, candidates[idx].lng]);
            }
        }

        // If we still don't have enough points, fill with jittered centroid
        while (points.length < n) {
            var jitterLat = centroid[0] + (Math.random() - 0.5) * latRange * 0.3;
            var jitterLng = centroid[1] + (Math.random() - 0.5) * lngRange * 0.3;
            points.push([jitterLat, jitterLng]);
        }

        return points;
    }

    // ===== Create room markers for a building =====
    function createRoomMarkers(dbBuildingName, roomsByFloor) {
        var polygon = buildingPolygons[dbBuildingName.toUpperCase()];
        if (!polygon) return;

        // Check for precomputed positions
        var precomputed = precomputedPositions[dbBuildingName.toUpperCase()] || {};
        var hasPrecomputed = Object.keys(precomputed).length > 0;

        var floorMarkers = {};

        Object.keys(roomsByFloor).forEach(function(floorKey) {
            var rooms = roomsByFloor[floorKey];
            // Only use grid fallback for rooms without precomputed positions
            var needsGrid = rooms.filter(function(r) { return !precomputed[r.room_no]; });
            var gridPositions = distributePointsInPolygon(polygon, needsGrid.length);
            var gridIdx = 0;
            floorMarkers[floorKey] = [];

            rooms.forEach(function(room, idx) {
                var pos;
                if (precomputed[room.room_no]) {
                    pos = precomputed[room.room_no]; // [lat, lng]
                } else {
                    if (gridIdx >= gridPositions.length) return;
                    pos = gridPositions[gridIdx++];
                }
                var rankColor = room.draw_rank ? getColor(room.draw_rank) : '#999';

                var occLabel = room.occupancy === '1' || room.occupancy === 1 ? 'Single' :
                               room.occupancy === '2' || room.occupancy === 2 ? 'Double' :
                               room.occupancy === '3' || room.occupancy === 3 ? 'Triple' :
                               room.occupancy === '4' || room.occupancy === 4 ? 'Quad' :
                               room.occupancy || '';

                var marker = L.circleMarker(pos, {
                    radius: 7,
                    fillColor: rankColor,
                    color: '#fff',
                    weight: 2,
                    opacity: 1,
                    fillOpacity: 0.85,
                });

                var bldg = room._building || dbBuildingName;
                marker.bindTooltip(
                    '<b>' + bldg + ' ' + room.room_no + '</b><br>' +
                    occLabel + (room.sq_footage ? ' · ' + room.sq_footage + ' sqft' : '') +
                    (room.draw_rank ? '<br>Rank: ' + room.draw_rank : ''),
                    { direction: 'top', offset: [0, -8] }
                );

                marker.on('click', function() {
                    openRoomViewer(bldg, room.room_no);
                });

                floorMarkers[floorKey].push(marker);
            });
        });

        loadedBuildingMarkers[dbBuildingName.toUpperCase()] = floorMarkers;
    }

    // ===== Show/hide room markers based on zoom and floor =====
    function refreshRoomMarkers() {
        roomMarkersGroup.clearLayers();
        if (mymap.getZoom() < roomMarkerZoomThreshold) return;

        var mapBounds = mymap.getBounds();

        Object.keys(loadedBuildingMarkers).forEach(function(bldg) {
            var floorMarkers = loadedBuildingMarkers[bldg];
            Object.keys(floorMarkers).forEach(function(floorKey) {
                if (activeRoomFloor !== null && floorKey !== activeRoomFloor) return;
                floorMarkers[floorKey].forEach(function(marker) {
                    if (mapBounds.contains(marker.getLatLng())) {
                        roomMarkersGroup.addLayer(marker);
                    }
                });
            });
        });
    }

    // ===== Load room markers for visible buildings =====
    var loadingBuildings = {};
    function loadRoomMarkersForVisibleBuildings() {
        if (mymap.getZoom() < roomMarkerZoomThreshold) {
            roomMarkersGroup.clearLayers();
            if (floorControl._container) floorControl._container.style.display = 'none';
            return;
        }

        if (floorControl._container) floorControl._container.style.display = 'block';

        var mapBounds = mymap.getBounds();

        // Check which buildings have polygons visible in current viewport
        Object.keys(buildingPolygons).forEach(function(bldgName) {
            if (loadedBuildingMarkers[bldgName] || loadingBuildings[bldgName]) return;

            var centroid = polygonCentroid(buildingPolygons[bldgName]);
            if (!mapBounds.contains(L.latLng(centroid[0], centroid[1]))) return;

            // Check if this polygon covers multiple DB buildings
            var dbNames = multiDbBuildings[bldgName] || [bldgName];
            loadingBuildings[bldgName] = true;

            var promises = dbNames.map(function(name) {
                return fetch('/api/building_rooms?building=' + encodeURIComponent(name))
                    .then(function(res) { return res.json(); });
            });

            Promise.all(promises).then(function(results) {
                var mergedFloors = {};
                results.forEach(function(data) {
                    if (data.floors) {
                        Object.keys(data.floors).forEach(function(f) {
                            if (!mergedFloors[f]) mergedFloors[f] = [];
                            data.floors[f].forEach(function(r) { r._building = data.building; });
                            mergedFloors[f] = mergedFloors[f].concat(data.floors[f]);
                        });
                    }
                });
                if (Object.keys(mergedFloors).length > 0) {
                    createRoomMarkers(bldgName, mergedFloors);
                    refreshRoomMarkers();
                }
                delete loadingBuildings[bldgName];
            }).catch(function() { delete loadingBuildings[bldgName]; });
        });

        refreshRoomMarkers();
    }

    mymap.on('zoomend moveend', loadRoomMarkersForVisibleBuildings);

    // ===== Floor selector control =====
    var FloorControl = L.Control.extend({
        options: { position: 'topright' },
        onAdd: function(map) {
            var container = L.DomUtil.create('div', 'leaflet-bar leaflet-control');
            container.style.background = '#fff';
            container.style.padding = '8px 12px';
            container.style.borderRadius = '8px';
            container.style.boxShadow = '0 2px 8px rgba(0,0,0,0.2)';
            container.style.display = 'none';
            container.style.maxHeight = '300px';
            container.style.overflowY = 'auto';
            container.innerHTML = '<div style="font-weight:600;font-size:0.8rem;color:#888;margin-bottom:6px;">FLOOR</div>' +
                '<div id="floorControlButtons"></div>';
            L.DomEvent.disableClickPropagation(container);
            L.DomEvent.disableScrollPropagation(container);
            return container;
        }
    });
    var floorControl = new FloorControl();
    floorControl.addTo(mymap);

    function updateFloorControl() {
        var allFloors = new Set();
        Object.keys(loadedBuildingMarkers).forEach(function(bldg) {
            Object.keys(loadedBuildingMarkers[bldg]).forEach(function(f) { allFloors.add(f); });
        });

        var sorted = Array.from(allFloors).sort(function(a, b) {
            var aNum = parseInt(a), bNum = parseInt(b);
            var aIsNum = !isNaN(aNum), bIsNum = !isNaN(bNum);
            if (!aIsNum && !bIsNum) return a.localeCompare(b);
            if (!aIsNum) return -1;
            if (!bIsNum) return 1;
            return aNum - bNum;
        });

        var html = '<button onclick="setRoomFloor(null)" style="display:block;width:100%;margin-bottom:3px;padding:3px 10px;border:1px solid ' +
            (activeRoomFloor === null ? '#e77500' : '#ddd') + ';border-radius:12px;background:' +
            (activeRoomFloor === null ? '#e77500' : '#fff') + ';color:' +
            (activeRoomFloor === null ? '#fff' : '#555') + ';cursor:pointer;font-size:0.8rem;font-weight:500;">All</button>';

        sorted.forEach(function(f) {
            var label = f === '0' ? 'G' : f;
            html += '<button onclick="setRoomFloor(\'' + f + '\')" style="display:block;width:100%;margin-bottom:3px;padding:3px 10px;border:1px solid ' +
                (activeRoomFloor === f ? '#e77500' : '#ddd') + ';border-radius:12px;background:' +
                (activeRoomFloor === f ? '#e77500' : '#fff') + ';color:' +
                (activeRoomFloor === f ? '#fff' : '#555') + ';cursor:pointer;font-size:0.8rem;font-weight:500;">' + label + '</button>';
        });

        var btn = document.getElementById('floorControlButtons');
        if (btn) btn.innerHTML = html;
    }

    function setRoomFloor(floor) {
        activeRoomFloor = floor;
        refreshRoomMarkers();
        updateFloorControl();
    }

    // Update floor control when markers load
    var origRefresh = refreshRoomMarkers;
    refreshRoomMarkers = function() {
        origRefresh();
        updateFloorControl();
    };
</script>

<!-- Building Panel Logic -->
<script>
    // Cache for fetched building data
    var buildingDataCache = {};
    var currentPanelBuilding = null;
    var currentPanelFloor = null;

    // Map from display names to DB building names
    var buildingNameMap = {
        "1927-Clapp": ["1927", "CLAPP"],
        "Laughlin 1901": ["LAUGHLIN", "1901"],
        "Yoseloff Hall, 1967": ["YOSELOFF", "1967"],
        "Bogle Hall, 1976 Hall, Wilf": ["BOGLE", "1976", "WILF"],
        "Whitman College, Hargadon": ["1981", "BAKER", "LAURITZEN", "HARGADON", "MURLEY", "WENDELL"],
    };

    // Normalize a display name to a DB building name
    function displayToDbName(name) {
        // Handle known multi-building entries
        if (buildingNameMap[name]) return buildingNameMap[name][0];

        // Strip " Hall" suffix
        var cleaned = name;
        if (cleaned.includes("Spelman")) cleaned = "Spelman Hall";
        if (cleaned.endsWith(" Hall")) cleaned = cleaned.slice(0, -5);
        if (cleaned === "Dodge-Osborne") cleaned = "Dodge Osborn";

        return cleaned.toUpperCase();
    }

    // Normalize display name to floorPlans key
    function displayToFloorPlanKey(name) {
        var cleaned = name;
        if (cleaned.includes("Spelman")) cleaned = "Spelman";
        if (cleaned.endsWith(" Hall")) cleaned = cleaned.slice(0, -5);
        return cleaned.toLowerCase().replace(/\s+/g, '');
    }

    function openBuildingPanel(displayName) {
        var panel = document.getElementById('buildingPanel');
        var dbName = displayToDbName(displayName);
        document.getElementById('panelBuildingName').textContent = displayName;
        currentPanelBuilding = dbName;
        currentPanelFloor = null;

        // Show loading state
        document.getElementById('panelRoomList').innerHTML =
            '<div class="panel-loading"><div class="text-center"><div class="spinner-border text-warning mb-2" role="status"></div><p>Loading rooms...</p></div></div>';
        document.getElementById('panelFloorTabs').innerHTML = '';
        document.getElementById('panelFloorPlan').style.display = 'none';
        document.getElementById('panelRoomCount').textContent = 'Rooms';

        panel.classList.add('open');

        // Handle multi-building entries by fetching all sub-buildings
        var dbNames = buildingNameMap[displayName] || [dbName];

        // Check cache
        var cacheKey = dbNames.join(',');
        if (buildingDataCache[cacheKey]) {
            renderBuildingPanel(displayName, buildingDataCache[cacheKey]);
            return;
        }

        // Fetch all sub-buildings in parallel
        var promises = dbNames.map(function(name) {
            return fetch('/api/building_rooms?building=' + encodeURIComponent(name))
                .then(function(res) { return res.json(); });
        });

        Promise.all(promises).then(function(results) {
            // Merge floors from all sub-buildings
            var mergedFloors = {};
            results.forEach(function(data) {
                if (data.floors) {
                    Object.keys(data.floors).forEach(function(floor) {
                        if (!mergedFloors[floor]) mergedFloors[floor] = [];
                        // Tag each room with its building name for display
                        data.floors[floor].forEach(function(room) {
                            if (!room._building) room._building = data.building;
                        });
                        mergedFloors[floor] = mergedFloors[floor].concat(data.floors[floor]);
                    });
                }
            });

            var merged = { building: displayName, floors: mergedFloors };
            buildingDataCache[cacheKey] = merged;
            renderBuildingPanel(displayName, merged);
        }).catch(function(err) {
            document.getElementById('panelRoomList').innerHTML =
                '<div class="panel-empty"><p>Failed to load room data.</p></div>';
        });
    }

    function renderBuildingPanel(displayName, data) {
        var floors = data.floors;
        var floorKeys = Object.keys(floors).sort(function(a, b) {
            // Sort floors: numeric ascending, non-numeric (G, A) first
            var aNum = parseInt(a), bNum = parseInt(b);
            var aIsNum = !isNaN(aNum), bIsNum = !isNaN(bNum);
            if (!aIsNum && !bIsNum) return a.localeCompare(b);
            if (!aIsNum) return -1;
            if (!bIsNum) return 1;
            return aNum - bNum;
        });

        if (floorKeys.length === 0) {
            document.getElementById('panelFloorTabs').innerHTML = '';
            document.getElementById('panelRoomList').innerHTML =
                '<div class="panel-empty"><p>No rooms found for this building.</p></div>';
            document.getElementById('panelRoomCount').textContent = '0 rooms';
            return;
        }

        // Render floor tabs
        var tabsHtml = '';
        floorKeys.forEach(function(floor) {
            var label = floor;
            if (floor === '0') label = 'G';
            tabsHtml += '<div class="floor-tab" data-floor="' + floor + '" onclick="selectFloor(\'' + floor + '\')">' +
                'Floor ' + label + ' <span style="font-size:0.75rem;color:#999;">(' + floors[floor].length + ')</span></div>';
        });
        document.getElementById('panelFloorTabs').innerHTML = tabsHtml;

        // Select the first floor
        selectFloor(floorKeys[0]);
    }

    function selectFloor(floorKey) {
        currentPanelFloor = floorKey;

        // Update active tab
        document.querySelectorAll('.floor-tab').forEach(function(tab) {
            tab.classList.toggle('active', tab.getAttribute('data-floor') === floorKey);
        });

        var cacheKey = currentPanelBuilding;
        // Check for multi-building entries
        var displayName = document.getElementById('panelBuildingName').textContent;
        var dbNames = buildingNameMap[displayName];
        if (dbNames) cacheKey = dbNames.join(',');

        var data = buildingDataCache[cacheKey];
        if (!data) return;

        var rooms = data.floors[floorKey] || [];

        // Update room count
        document.getElementById('panelRoomCount').textContent = rooms.length + ' room' + (rooms.length !== 1 ? 's' : '') + ' on floor ' + (floorKey === '0' ? 'G' : floorKey);

        // Try to show floor plan image for this floor
        loadFloorPlanPreview(displayName, floorKey);

        // Render room cards
        if (rooms.length === 0) {
            document.getElementById('panelRoomList').innerHTML =
                '<div class="panel-empty"><p>No rooms on this floor.</p></div>';
            return;
        }

        var html = '';
        rooms.forEach(function(room) {
            var rankColor = room.draw_rank ? getColor(room.draw_rank) : '#ccc';
            var buildingLabel = room._building || currentPanelBuilding;
            var occLabel = room.occupancy === '1' || room.occupancy === 1 ? 'Single' :
                           room.occupancy === '2' || room.occupancy === 2 ? 'Double' :
                           room.occupancy === '3' || room.occupancy === 3 ? 'Triple' :
                           room.occupancy === '4' || room.occupancy === 4 ? 'Quad' : room.occupancy;
            var metaParts = [];
            if (occLabel) metaParts.push(occLabel);
            if (room.sq_footage) metaParts.push(room.sq_footage + ' sqft');
            if (room.draw_rank) metaParts.push('Rank: ' + room.draw_rank);

            html += '<div class="room-card" onclick="openRoomFromPanel(\'' +
                escapeAttr(buildingLabel) + '\', \'' + escapeAttr(room.room_no) + '\')">';
            html += '<div class="room-rank-dot" style="background:' + rankColor + ';" title="Draw rank: ' + (room.draw_rank || 'N/A') + '"></div>';
            html += '<div class="room-card-info">';
            html += '<div class="room-card-title">' + escapeHtml(buildingLabel) + ' ' + escapeHtml(room.room_no) + '</div>';
            html += '<div class="room-card-meta">' + escapeHtml(metaParts.join(' · ')) + '</div>';
            html += '</div>';
            html += '<div class="room-card-badges">';
            if (room.ac === 'YES') html += '<span class="room-badge" title="Air Conditioning">AC</span>';
            if (room.has_360) html += '<span class="room-badge room-badge-360" title="360° View">360°</span>';
            if (room.num_reviews > 0) html += '<span class="room-badge" title="' + room.num_reviews + ' review(s)">★ ' + (room.avg_rating || '-') + '</span>';
            html += '</div>';
            html += '</div>';
        });

        document.getElementById('panelRoomList').innerHTML = html;
    }

    function loadFloorPlanPreview(displayName, floorKey) {
        var fpKey = displayToFloorPlanKey(displayName);
        var fpData = floorPlans[fpKey];
        var previewDiv = document.getElementById('panelFloorPlan');
        var frame = document.getElementById('panelFloorPlanFrame');

        if (!fpData) {
            previewDiv.style.display = 'none';
            frame.src = '';
            return;
        }

        // Determine the PDF URL for this floor
        var floorLabel = floorKey === '0' ? 'G' : floorKey;
        var pdfUrl = null;

        if (Array.isArray(fpData)) {
            if (fpData.indexOf(floorLabel) !== -1 || fpData.indexOf(floorKey) !== -1) {
                var matchLabel = fpData.indexOf(floorLabel) !== -1 ? floorLabel : floorKey;
                pdfUrl = '/static/pdfs/' + fpKey + '/' + matchLabel + '.pdf';
            }
        } else if (typeof fpData === 'object') {
            // Complex buildings with sub-wings (forbes, wendell, baker)
            // Show the first available wing
            var wings = Object.keys(fpData);
            for (var w = 0; w < wings.length; w++) {
                var wingFloors = fpData[wings[w]];
                if (wingFloors.indexOf(floorLabel) !== -1 || wingFloors.indexOf(floorKey) !== -1) {
                    var wMatchLabel = wingFloors.indexOf(floorLabel) !== -1 ? floorLabel : floorKey;
                    pdfUrl = '/static/pdfs/' + fpKey + '/' + wings[w] + '/' + wMatchLabel + '.pdf';
                    break;
                }
            }
        }

        if (pdfUrl) {
            previewDiv.style.display = 'block';
            previewDiv.setAttribute('data-pdf-url', pdfUrl);
            frame.src = pdfUrl;
        } else {
            previewDiv.style.display = 'none';
            frame.src = '';
        }
    }

    function expandFloorPlan() {
        var previewDiv = document.getElementById('panelFloorPlan');
        var pdfUrl = previewDiv.getAttribute('data-pdf-url');
        if (pdfUrl) {
            window.open(pdfUrl, '_blank');
        }
    }

    function openRoomFromPanel(building, roomNo) {
        openRoomViewer(building, roomNo);
    }

    function closeBuildingPanel() {
        document.getElementById('buildingPanel').classList.remove('open');
    }

    // Close panel when clicking on the map
    mymap.on('click', function(e) {
        // Only close if click is not on a feature
        if (!e.originalEvent._buildingClick) {
            closeBuildingPanel();
        }
    });

    // Helper: escape HTML entities
    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function escapeAttr(str) {
        if (!str) return '';
        return String(str).replace(/\\/g,'\\\\').replace(/'/g, "\\'").replace(/"/g, '\\"');
    }
</script>
