<!-- Room Viewer Modal - 360 views, room plans, floor plans -->
<style>
  #roomViewerModal .modal-dialog {
    max-width: 95vw;
    width: 95vw;
    margin: 1.5vh auto;
  }
  #roomViewerModal .modal-content {
    height: 95vh;
    border-radius: 12px;
    overflow: hidden;
  }
  #roomViewerModal .modal-body {
    display: flex;
    flex-direction: column;
    flex: 1;
    min-height: 0;
    padding: 0;
  }
  #roomViewerModal .tab-content {
    flex: 1;
    min-height: 0;
  }
  #roomViewerModal .tab-pane {
    height: 100%;
  }
  #roomViewerModal .tab-pane.active {
    display: flex !important;
    flex-direction: column;
    height: 100%;
  }
  #roomViewerModal .nav-tabs {
    border-bottom: 2px solid #e77500;
    flex-shrink: 0;
    padding: 4px 16px 0;
  }
  #roomViewerModal .nav-tabs .nav-link {
    color: #555;
    font-weight: 500;
    border: none;
    padding: 10px 20px;
    cursor: pointer;
  }
  #roomViewerModal .nav-tabs .nav-link.active {
    color: #e77500;
    border-bottom: 3px solid #e77500;
    background: transparent;
  }
  #roomViewerModal .nav-tabs .nav-link:hover {
    color: #e77500;
  }
  #viewer360Container {
    width: 100%;
    min-height: 500px;
    height: calc(95vh - 130px);
    position: relative;
    background: #111;
  }
  #viewer360Container iframe {
    width: 100%;
    height: 100%;
    border: none;
  }
  .room-viewer-img-pane {
    width: 100%;
    min-height: 500px;
    height: calc(95vh - 130px);
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f5f5f5;
    overflow: auto;
    padding: 20px;
  }
  .room-viewer-img-pane img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
  }
</style>

<div class="modal fade" id="roomViewerModal" tabindex="-1" role="dialog" aria-labelledby="roomViewerModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered" role="document">
    <div class="modal-content">
      <div class="modal-header py-2" style="background: linear-gradient(135deg, #e77500 0%, #f59e42 100%); color: white;">
        <h5 class="modal-title" id="roomViewerModalLabel" style="font-size: 1.1rem;">
          <i class="bi bi-eye-fill mr-2"></i>
          <span id="roomViewerTitle">Room Viewer</span>
        </h5>
        <button type="button" class="close" data-dismiss="modal" aria-label="Close" style="color: white; opacity: 1;">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body">
        <!-- Bootstrap 4 tabs -->
        <ul class="nav nav-tabs" id="roomViewerTabs" role="tablist">
          <li class="nav-item">
            <a class="nav-link active" id="tab-360" data-toggle="tab" href="#pane-360" role="tab">
              <i class="bi bi-badge-vr-fill mr-1"></i> 360° View
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" id="tab-roomplan" data-toggle="tab" href="#pane-roomplan" role="tab">
              <i class="bi bi-bounding-box mr-1"></i> Room Plan
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" id="tab-floorplan" data-toggle="tab" href="#pane-floorplan" role="tab">
              <i class="bi bi-map mr-1"></i> Floor Plan
            </a>
          </li>
        </ul>

        <div class="tab-content" id="roomViewerTabContent">
          <!-- 360 View -->
          <div class="tab-pane fade show active" id="pane-360" role="tabpanel">
            <div id="viewer360Container">
              <div id="viewer360Loading" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; text-align: center; z-index: 2;">
                <div class="spinner-border text-warning mb-2" role="status"></div>
                <p>Loading 360° view...</p>
              </div>
              <iframe id="viewer360Frame" style="display: none;" allowfullscreen loading="lazy"></iframe>
              <div id="viewer360None" style="display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #666; text-align: center;">
                <i class="bi bi-camera-video-off" style="font-size: 4rem;"></i>
                <p class="mt-3" style="font-size: 1.1rem;">No 360° view available for this room</p>
              </div>
            </div>
          </div>

          <!-- Room Plan -->
          <div class="tab-pane fade" id="pane-roomplan" role="tabpanel">
            <div class="room-viewer-img-pane">
              <img id="roomPlanImg" src="" alt="Room Plan" style="display: none;" referrerpolicy="no-referrer" />
              <div id="roomPlanNone" style="color: #888; text-align: center;">
                <i class="bi bi-image" style="font-size: 4rem;"></i>
                <p class="mt-3" style="font-size: 1.1rem;">No room plan available</p>
              </div>
            </div>
          </div>

          <!-- Floor Plan -->
          <div class="tab-pane fade" id="pane-floorplan" role="tabpanel">
            <div class="room-viewer-img-pane">
              <img id="floorPlanImg" src="" alt="Floor Plan" style="display: none;" referrerpolicy="no-referrer" />
              <div id="floorPlanNone" style="color: #888; text-align: center;">
                <i class="bi bi-image" style="font-size: 4rem;"></i>
                <p class="mt-3" style="font-size: 1.1rem;">No floor plan available</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
function openRoomViewer(building, roomNo) {
    document.getElementById('roomViewerTitle').textContent = building + ' ' + roomNo;

    // Reset state
    document.getElementById('viewer360Frame').style.display = 'none';
    document.getElementById('viewer360Frame').src = '';
    document.getElementById('viewer360Loading').style.display = 'block';
    document.getElementById('viewer360None').style.display = 'none';
    document.getElementById('roomPlanImg').style.display = 'none';
    document.getElementById('floorPlanImg').style.display = 'none';

    // Hide all optional tabs until we know what data exists
    $('#tab-360').parent().hide();
    $('#tab-roomplan').parent().hide();
    $('#tab-floorplan').parent().hide();

    // Reset placeholders
    document.getElementById('roomPlanNone').style.display = 'block';
    document.getElementById('floorPlanNone').style.display = 'block';

    // Show modal (Bootstrap 4)
    $('#roomViewerModal').modal('show');

    // Fetch images
    fetch('/room_images?building=' + encodeURIComponent(building) + '&room_no=' + encodeURIComponent(roomNo))
        .then(function(res) { return res.json(); })
        .then(function(data) {
            document.getElementById('viewer360Loading').style.display = 'none';

            var firstTab = null;

            // 360 — only show tab if data exists
            if (data.views_360 && data.views_360.length > 0) {
                $('#tab-360').parent().show();
                if (!firstTab) firstTab = '#pane-360';
                var view = data.views_360.find(function(v) { return v.mediaType === 'ACTUAL'; }) || data.views_360[0];
                var frame = document.getElementById('viewer360Frame');
                var url360 = view.url;
                if (url360.indexOf('#') === -1) {
                    url360 += '#node1,0,0,140';
                }
                frame.src = url360;
                frame.style.display = 'block';
            } else {
                document.getElementById('viewer360None').style.display = 'block';
            }

            // Room Plan — only show tab if data exists
            if (data.room_plan) {
                $('#tab-roomplan').parent().show();
                if (!firstTab) firstTab = '#pane-roomplan';
                var rpImg = document.getElementById('roomPlanImg');
                rpImg.src = data.room_plan;
                rpImg.style.display = 'block';
                document.getElementById('roomPlanNone').style.display = 'none';
            }

            // Floor Plan — only show tab if data exists
            if (data.floor_plan) {
                $('#tab-floorplan').parent().show();
                if (!firstTab) firstTab = '#pane-floorplan';
                var fpImg = document.getElementById('floorPlanImg');
                fpImg.src = data.floor_plan;
                fpImg.style.display = 'block';
                document.getElementById('floorPlanNone').style.display = 'none';
            }

            // Activate the first available tab
            if (firstTab) {
                $('#roomViewerTabs a[href="' + firstTab + '"]').tab('show');
            }
        })
        .catch(function(err) {
            document.getElementById('viewer360Loading').style.display = 'none';
            document.getElementById('viewer360None').style.display = 'block';
        });
}

// Clean up iframe when modal closes
$('#roomViewerModal').on('hidden.bs.modal', function() {
    document.getElementById('viewer360Frame').src = '';
});
</script>
